.row{display:flex;align-items:stretch;position:relative;z-index:1;margin-bottom:6px}
.col-card{flex:1;min-width:0;display:flex}
.col-conn{width:20px;flex-shrink:0;display:flex;align-items:flex-start}

.col-m{width:20px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;position:relative}
.dot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--color-border-secondary);background:var(--color-background-primary);margin-top:12px;z-index:2;flex-shrink:0;transition:all .2s}
.dot.done-dot{border-color:#4ade80;background:#4ade80}
.cyber .dot.done-dot{border-color:#60a5fa;background:#60a5fa}
.fin .dot.done-dot{border-color:#fb923c;background:#fb923c}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);flex:1}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;transition:background .1s;border-radius:var(--border-radius-lg)}
.card-hd:hover{background:var(--color-background-secondary)}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.card-meta{display:flex;align-items:center;gap:6px}
.card-prog{font-family:'JetBrains Mono',var(--font-mono);font-size:10px;color:var(--color-text-tertiary)}
.card-bar{width:36px;height:3px;border-radius:2px;background:var(--color-border-tertiary);overflow:hidden}
.card-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.fund .card-bar-fill{background:#4ade80}
.cyber .card-bar-fill{background:#60a5fa}
.fin .card-bar-fill{background:#fb923c}
.arr{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.card-body{border-top:0.5px solid var(--color-border-tertiary)}
.grp-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:7px 12px 3px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:background .08s;border-bottom:0.5px solid var(--color-border-tertiary)}
.item:last-child{border-bottom:none}
.item:hover{background:var(--color-background-secondary)}
.item.sub{padding-left:28px}
.circ{width:14px;height:14px;border-radius:50%;border:2px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent}

.fund .item.done .circ i{color:#052e16}
.cyber .item.done .circ{border-color:#60a5fa;background:#60a5fa}

.fin .item.done .circ{border-color:#fb923c;background:#fb923c}

.item-label{font-size:12px;color:var(--color-text-primary);line-height:1.35;flex:1}

.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 12px;position:relative;z-index:2}
.top-t{font-family:'JetBrains Mono',var(--font-mono);font-size:12px;font-weight:500;color:var(--color-text-secondary)}

.pbar{height:4px;border-radius:2px;background:var(--color-border-tertiary);margin:0 12px 20px;overflow:hidden;position:relative;z-index:2}
.pfill{height:100%;border-radius:2px;transition:width .4s;background:linear-gradient(90deg,#4ade80,#60a5fa,#fb923c)}

const st={};
function getLeaves(items){
  let a=[];
  for(const it of items){
    if(it.length>2&&Array.isArray(it[2])){for(let i=2;i<it.length;i++)a.push(it[i]);}
    else if(!it[0].startsWith('_'))a.push(it);
  }
  return a;
}
function secProg(sec){const lv=getLeaves(sec.items);return{t:lv.length,d:lv.filter(l=>st[l[0]]).length};}
function allProg(){let t=0,d=0;for(const s of D){if(s.type==='hdr')continue;const p=secProg(s);t+=p.t;d+=p.d;}return{t,d};}

function render(){
  let h='';
  for(const sec of D){
    if(sec.type==='hdr'){
      h+=`<div class="hdr"><span class="hdr-tag ${sec.cls}">${sec.text}</span></div>`;
      continue;
    }
    const{t,d}=secProg(sec);
    const allDone=t>0&&d===t;
    const open=st['_o_'+sec.id]!==false;
    const pct=t?Math.round(d/t*100):0;
    const isL=sec.s==='l';
    const dCls=allDone?' done-dot':'';

    h+=`<div class="row ${sec.g}">`;
    if(isL){
      h+=`<div class="col-card" style="justify-content:flex-end"><div class="card">${cardInner(sec,t,d,pct,open)}</div></div>`;
      h+=`<div class="col-conn"><div class="conn-line"></div></div>`;
      h+=`<div class="col-m"><div class="dot${dCls}"></div></div>`;
      h+=`<div class="col-conn"></div>`;
      h+=`<div class="col-card"></div>`;
    } else {
      h+=`<div class="col-card"></div>`;
      h+=`<div class="col-conn"></div>`;
      h+=`<div class="col-m"><div class="dot${dCls}"></div></div>`;
      h+=`<div class="col-conn"><div class="conn-line"></div></div>`;
      h+=`<div class="col-card"><div class="card">${cardInner(sec,t,d,pct,open)}</div></div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('app').innerHTML=h;
  const{t,d}=allProg();
  document.getElementById('tc').textContent=`${d} / ${t}`;
  document.getElementById('pf').style.width=(t?Math.round(d/t*100):0)+'%';
}

function cardInner(sec,t,d,pct,open){
  let h=`<div class="card-hd" onclick="tS('${sec.id}')"><span class="card-title">${sec.label}</span><div class="card-meta"><span class="card-prog">${d}/${t}</span><div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div><span class="arr">${open?'▲':'▼'}</span></div></div>`;
  if(open){
    h+=`<div class="card-body">`;
    for(const it of sec.items){
      if(it.length>2&&Array.isArray(it[2])){
        h+=`<div class="grp-label">${it[1]}</div>`;
        for(let i=2;i<it.length;i++){h+=itemRow(it[i][0],it[i][1],true);}
      } else if(!it[0].startsWith('_')){
        h+=itemRow(it[0],it[1],false);
      }
    }
    h+=`</div>`;
  }
  return h;
}

function itemRow(id,label,isSub){
  return`<div class="item${isSub?' sub':''}${st[id]?' done':''}" onclick="tL('${id}')"><div class="circ"><i class="ti ti-check"></i></div><span class="item-label">${label}</span></div>`;
}

function tS(id){st['_o_'+id]=st['_o_'+id]===false;save();render();}
function tL(id){st[id]=!st[id];save();render();}
async function save(){try{await window.storage.set(K,JSON.stringify(st));}catch(e){}}
async function load(){try{const r=await window.storage.get(K);if(r&&r.value)Object.assign(st,JSON.parse(r.value));}catch(e){}}
load().then(render);
</script>
